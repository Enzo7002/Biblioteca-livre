                            <script>
function buscarLivros() {
    let input = document.getElementById("busca").value.toLowerCase();
    let livros = document.getElementsByClassName("livro");

    for (let i = 0; i < livros.length; i++) {
        let titulo = livros[i].innerText.toLowerCase();

        // 👉 Se não digitou nada, mostra tudo
        if (input === "") {
            livros[i].style.display = "inline-block";
        } 
        // 👉 Se encontrou o texto, mostra
        else if (titulo.includes(input)) {
            livros[i].style.display = "inline-block";
        } 
        // 👉 Se não encontrou, esconde
        else {
            livros[i].style.display = "none";
        }
    }
}
</script>
<script>
function limparBusca() {
    document.getElementById("busca").value = "";
    buscarLivros();
}
</script>
